<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultimate YouTube Downloader</title>
<style>
body{
font-family: Arial, Helvetica, sans-serif;
background:#020617;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:#020617;
border:1px solid #1f2937;
padding:25px;
border-radius:16px;
}

h1{
margin-top:0;
}

input, textarea, select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #1f2937;
background:#020617;
color:white;
margin-top:10px;
}

textarea{
height:120px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

button:hover{
background:#dc2626;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.thumb{
margin-top:20px;
}

.thumb img{
width:100%;
border-radius:12px;
}

.result a{
display:block;
margin-top:8px;
color:#22c55e;
}

.badge{
background:#111827;
padding:5px 10px;
border-radius:6px;
margin-right:5px;
}

</style>
</head>
<body>

<div class="container">
<h1>Ultimate YouTube Downloader</h1>

<label>Single Video URL</label>
<input id="url" placeholder="https://youtube.com/...">

<div class="grid">
<div>
<label>Format</label>
<select id="format">
<option value="mp4">Video (MP4)</option>
<option value="mp3">Audio (MP3)</option>
</select>
</div>

<div>
<label>Quality</label>
<select id="quality">
<option>1080p</option>
<option>720p</option>
<option>4K</option>
<option>2K</option>
<option>480p</option>
</select>
</div>
</div>

<button onclick="downloadSingle()">Download</button>
<button onclick="getThumbnail()">Get Thumbnail</button>

<div class="thumb" id="thumb"></div>

<hr style="margin:30px 0; border-color:#1f2937">

<h3>Bulk Downloader</h3>
<textarea id="bulk" placeholder="Paste multiple YouTube links... one per line"></textarea>
<button onclick="bulkDownload()">Download All</button>

<div class="result" id="result"></div>

<hr style="margin:30px 0; border-color:#1f2937">

<h3>Chrome Extension</h3>
<p>1. Save this file as <b>index.html</b></p>
<p>2. Create <b>manifest.json</b></p>
<p>3. Load as unpacked extension</p>

<textarea>
{
"manifest_version": 3,
"name": "YouTube Downloader",
"version": "1.0",
"action": {
"default_popup": "index.html"
},
"permissions": ["activeTab"]
}
</textarea>

</div>

<script>
function extractID(url){
const reg = /(?:youtube\.com.*(?:\\?|&)v=|youtu\.be\/)([^&\n?#]+)/;
const match = url.match(reg);
return match ? match[1] : null;
}

function downloadSingle(){
const url = document.getElementById('url').value;
const format = document.getElementById('format').value;
const quality = document.getElementById('quality').value;

if(!url) return alert('Paste URL');

const encoded = encodeURIComponent(url);

let link = `https://en.savefrom.net/1-youtube-video-downloader-50/?url=${encoded}`;

window.open(link,'_blank');
}

function getThumbnail(){
const url = document.getElementById('url').value;
const id = extractID(url);

if(!id) return alert('Invalid URL');

const thumb = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;

document.getElementById('thumb').innerHTML = `
<img src="${thumb}">
<a href="${thumb}" target="_blank">Download Thumbnail</a>
`;
}

function bulkDownload(){
const data = document.getElementById('bulk').value;
const urls = data.split('\n');

let html='';

urls.forEach(u=>{
if(u.trim()){
const encoded = encodeURIComponent(u);
const link = `https://en.savefrom.net/1-youtube-video-downloader-50/?url=${encoded}`;
html += `<a href="${link}" target="_blank">Download → ${u}</a>`;
}
});

document.getElementById('result').innerHTML = html;
}
</script>

</body>
</html>
